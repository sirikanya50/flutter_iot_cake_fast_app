name: flutter_iot_cake_fast_app
description: "A new Flutter project."
publish_to: 'none'
 
environment:
  sdk: ^3.10.8
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.1
  font_awesome_flutter: ^10.12.0
  url_launcher: ^6.3.2
  map_launcher: ^4.4.3
  carousel_slider: ^5.1.2
  dots_indicator: ^4.0.1
  flutter_map: ^6.0.0
  latlong2: ^0.9.1
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  
 
flutter:
  uses-material-design: true
  assets:
    - assets/images/
 
icons_launcher:
  image_path: "assets/images/icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
 